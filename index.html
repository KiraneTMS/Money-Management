<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Money Tracker</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --green: #059669;
      --green-dark: #047857;
      --red: #dc2626;
      --purple: #7c3aed;
      --gray: #6b7280;
      --light: #f9fafb;
      --white: white;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--light);
      color: #111827;
      line-height: 1.5;
      min-height: 100vh;
      padding: 16px;
    }

    h1 { text-align: center; color: var(--primary); margin: 0 0 24px; font-size: 1.8rem; }
    .container { max-width: 900px; margin: 0 auto; }
    .section {
      background: var(--white);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h3 { margin-bottom: 16px; color: #1f2937; font-size: 1.25rem; }
    label { display: block; margin: 12px 0 6px; font-weight: 500; font-size: 0.95rem; }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    button.primary { background: var(--primary); color: white; }
    button.primary:hover { background: var(--primary-dark); }
    button.green { background: var(--green); color: white; margin-top: 12px; }
    button.green:hover { background: var(--green-dark); }
    .delete-btn {
      background: var(--red);
      color: white;
      padding: 6px 10px;
      font-size: 0.9rem;
      border-radius: 6px;
      margin-left: 8px;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { background: #f3f4f6; font-weight: 600; }
    .income { color: var(--green); font-weight: 600; }
    .expense { color: var(--red); font-weight: 600; }
    .transfer { color: var(--purple); font-weight: 600; }
    .balance-table td:last-child { text-align: right; font-weight: bold; }
    .small-hint { font-size: 0.85rem; color: var(--gray); margin-top: 4px; }

    .source-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .source-item {
      background: #f3f4f6;
      padding: 8px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      font-size: 0.95rem;
    }

    #report { display: none; }
    .report-total { font-size: 1.4rem; font-weight: bold; margin: 16px 0; }
    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin: 24px 0;
    }
    .report-card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
    }
    .report-card h4 { margin-bottom: 12px; color: #374151; }

    @media (max-width: 640px) {
      body { padding: 12px; }
      h1 { font-size: 1.6rem; }
      .section { padding: 16px; }
      button, input, select { padding: 14px; font-size: 1.05rem; }
      .table-wrapper { overflow-x: auto; }
      table { display: none; }
      .trans-card {
        display: block;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 12px;
      }
    }

    @media print {
      button, .delete-btn, h1, #add-section, #transaction-section { display: none !important; }
      #report { display: block !important; }
      body { background: white; padding: 0; }
    }
  </style>
</head>
<body>

<div class="container">

<h1>💸 Money Tracker (Firestore)</h1>

<div class="section">
  <h3>Manage Sources</h3>
  <input type="text" id="newSource" placeholder="BCA • Gopay • Cash • Dompet" />
  <button id="btnAddSource" class="green">+ Add Source</button>

  <div class="source-list" id="sourceItems"></div>
  <div id="sourceHint" class="small-hint" style="margin-top:12px;"></div>
</div>

<div class="section">
  <h3>New Transaction</h3>
  
  <label>Date</label>
  <input type="date" id="date" required />

  <label>Type</label>
  <select id="type">
    <option value="income">Income (+)</option>
    <option value="expense">Spending (-)</option>
    <option value="transfer">Transfer →</option>
  </select>

  <div id="normalFields">
    <label>Amount (Rp)</label>
    <input type="number" id="amount" min="0" step="1" placeholder="500000" required />

    <label>Source</label>
    <select id="source"></select>

    <label>Note (optional)</label>
    <input type="text" id="note" placeholder="Gaji Maret • Belanja bulanan" />
  </div>

  <div id="transferFields" style="display:none;">
    <label>From Source</label>
    <select id="fromSource"></select>

    <label>To Source</label>
    <select id="toSource"></select>

    <label>Amount (Rp)</label>
    <input type="number" id="transferAmount" min="0" step="1" placeholder="1000000" required />

    <label>Note (optional)</label>
    <input type="text" id="transferNote" placeholder="Top up dari BCA" />
  </div>

  <button id="btnSaveTransaction" class="primary" style="margin-top:16px; width:100%;">Save</button>
</div>

<div class="section">
  <h3>Transactions</h3>
  <div class="table-wrapper">
    <table id="transTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Amount</th>
          <th>From / Source</th>
          <th>To / Note</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="transBody"></tbody>
    </table>
  </div>
  <div id="transCards"></div>
</div>

<div class="section">
  <h3>Balance per Source</h3>
  <table class="balance-table" id="balanceTable">
    <thead><tr><th>Source</th><th style="text-align:right">Balance (Rp)</th></tr></thead>
    <tbody id="balanceBody"></tbody>
  </table>
</div>

<div class="section">
  <h3>Report</h3>
  <button class="primary" id="btnToggleReport">Show / Hide Report</button>
  
  <div id="report">
    <div class="report-total" id="reportOverview"></div>
    <div class="report-grid" id="reportPerSource"></div>
    <div style="margin-top:32px; text-align:center; color:#6b7280;">
      <small>Printed / saved on: <span id="reportDate"></span></small>
    </div>
  </div>
</div>

</div>

<script type="module">
  // Firebase Modular SDK imports (latest as of Feb 2026: v12.10.0)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    deleteDoc,
    doc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp,
    where
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  // Your Firebase config (keep this — it's safe for client-side)
  const firebaseConfig = {
    apiKey: "AIzaSyBQWerKMV8x0nGLYo2JxY255MVthOnTSjU",
    authDomain: "money-tracker-arin.firebaseapp.com",
    projectId: "money-tracker-arin",
    storageBucket: "money-tracker-arin.firebasestorage.app",
    messagingSenderId: "1057567292869",
    appId: "1:1057567292869:web:c7aa27e8ba066bf9255fac",
    measurementId: "G-B43Y7LLM68"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Global data (no more localStorage)
  let data = {
    sources: [],
    transactions: []
  };

  const SOURCES_COLLECTION = "sources";
  const TRANSACTIONS_COLLECTION = "transactions";

  // Real-time listener for sources
  onSnapshot(collection(db, SOURCES_COLLECTION), (snap) => {
    data.sources = snap.docs.map(d => ({ id: d.id, ...d.data() })).map(s => s.name).sort();
    updateAll();
  }, (err) => console.error("Sources listener error:", err));

  // Real-time listener for transactions (sorted by date desc)
  onSnapshot(
    query(collection(db, TRANSACTIONS_COLLECTION), orderBy("date", "desc")),
    (snap) => {
      data.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateAll();
    },
    (err) => console.error("Transactions listener error:", err)
  );

  function getBalances() {
    const balances = {};
    data.sources.forEach(s => balances[s] = 0);

    data.transactions.forEach(t => {
      const amt = Number(t.amount);
      if (t.type === 'income') balances[t.source] = (balances[t.source] || 0) + amt;
      else if (t.type === 'expense') balances[t.source] = (balances[t.source] || 0) - amt;
      else if (t.type === 'transfer') {
        balances[t.from] = (balances[t.from] || 0) - amt;
        balances[t.to] = (balances[t.to] || 0) + amt;
      }
    });
    return balances;
  }

  function canDeleteSource(sourceName) {
    const balances = getBalances();
    const hasBalance = balances[sourceName] !== 0;
    const hasTransactions = data.transactions.some(t => 
      t.source === sourceName || t.from === sourceName || t.to === sourceName
    );
    return !hasBalance && !hasTransactions;
  }

  async function deleteSource(sourceName) {
    if (!canDeleteSource(sourceName)) {
      const balances = getBalances();
      const reason = balances[sourceName] !== 0 
        ? `Balance is not zero (${balances[sourceName].toLocaleString('id-ID')})`
        : 'This source is used in some transactions';
      alert(`Cannot delete "${sourceName}" because:\n${reason}\n\n(only unused sources with zero balance can be removed)`);
      return;
    }

    if (!confirm(`Really delete source "${sourceName}"?`)) return;

    // Find the doc id for this source name
    const q = query(collection(db, SOURCES_COLLECTION), where("name", "==", sourceName));
    const snap = await getDocs(q);
    if (snap.empty) return;

    const docId = snap.docs[0].id;
    await deleteDoc(doc(db, SOURCES_COLLECTION, docId));
    // No need to updateAll — listener will catch it
  }

  async function addSource() {
    const input = document.getElementById('newSource');
    const name = input.value.trim();
    if (!name) return alert('Masukkan nama sumber');
    if (data.sources.includes(name)) return alert('Sudah ada');

    await addDoc(collection(db, SOURCES_COLLECTION), {
      name,
      createdAt: serverTimestamp()
    });

    input.value = '';
    // listener will update UI
  }

  async function addTransaction() {
    const type = document.getElementById('type').value;
    const date = document.getElementById('date').value;

    let transactionData;

    if (type === 'transfer') {
      const amount = document.getElementById('transferAmount').value;
      const from   = document.getElementById('fromSource').value;
      const to     = document.getElementById('toSource').value;
      const note   = document.getElementById('transferNote').value.trim();

      if (!date || !amount || Number(amount) <= 0 || !from || !to) return alert('Isi semua kolom transfer');
      if (from === to) return alert('Sumber asal dan tujuan harus berbeda');

      transactionData = { date, type, amount: Number(amount), from, to, note };
    } else {
      const amount = document.getElementById('amount').value;
      const source = document.getElementById('source').value;
      const note   = document.getElementById('note').value.trim();

      if (!date || !amount || Number(amount) <= 0 || !source) return alert('Isi semua kolom');

      transactionData = { date, type, amount: Number(amount), source, note };
    }

    await addDoc(collection(db, TRANSACTIONS_COLLECTION), {
      ...transactionData,
      createdAt: serverTimestamp()
    });

    // Clear form
    ['amount','transferAmount','note','transferNote'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('date').value = new Date().toISOString().slice(0,10);

    // listener handles UI update
  }

  function deleteTransaction(docId) {
    if (!confirm('Hapus transaksi ini?')) return;
    deleteDoc(doc(db, TRANSACTIONS_COLLECTION, docId));
    // listener will refresh
  }

  function updateSourceSelects() {
    const selectors = [
      document.getElementById('source'),
      document.getElementById('fromSource'),
      document.getElementById('toSource')
    ].filter(Boolean);

    selectors.forEach(sel => sel.innerHTML = '');

    data.sources.forEach(src => {
      selectors.forEach(sel => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = src;
        sel.appendChild(opt);
      });
    });
  }

  function updateSourceList() {
    const container = document.getElementById('sourceItems');
    container.innerHTML = '';

    const balances = getBalances();

    data.sources.forEach(src => {
      const item = document.createElement('div');
      item.className = 'source-item';

      const nameSpan = document.createElement('span');
      nameSpan.textContent = src;
      item.appendChild(nameSpan);

      const bal = balances[src] || 0;
      if (bal !== 0) {
        const balSpan = document.createElement('span');
        balSpan.style.marginLeft = '8px';
        balSpan.style.fontWeight = 'bold';
        balSpan.style.color = bal >= 0 ? 'var(--green)' : 'var(--red)';
        balSpan.textContent = bal.toLocaleString('id-ID');
        item.appendChild(balSpan);
      }

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '×';
      delBtn.onclick = () => deleteSource(src);
      item.appendChild(delBtn);

      container.appendChild(item);
    });

    document.getElementById('sourceHint').textContent = 
      data.sources.length === 0 ? 'No sources yet. Add your first one above.' : '';
  }

  function updateTransactions() {
    const tbody = document.getElementById('transBody');
    const cardsDiv = document.getElementById('transCards');
    tbody.innerHTML = cardsDiv.innerHTML = '';

    // Already sorted by Firestore query (date desc)
    data.transactions.forEach(t => {
      let displayType = t.type.charAt(0).toUpperCase() + t.type.slice(1);
      let fromCol = t.source || t.from || '—';
      let toNoteCol = t.note || t.to || '—';
      let amountSign = t.type === 'income' ? '+' : t.type === 'expense' ? '-' : '→';

      if (t.type === 'transfer') {
        fromCol = t.from;
        toNoteCol = t.to + (t.note ? ` (${t.note})` : '');
      }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${t.date}</td>
        <td class="${t.type}">${displayType}</td>
        <td class="${t.type}">${amountSign} ${Number(t.amount).toLocaleString('id-ID')}</td>
        <td>${fromCol}</td>
        <td>${toNoteCol}</td>
        <td><button class="delete-btn" onclick="deleteTransaction('${t.id}')">×</button></td>
      `;
      tbody.appendChild(tr);

      const card = document.createElement('div');
      card.className = 'trans-card';
      card.innerHTML = `
        <div><strong>${t.date}</strong> • ${displayType}</div>
        <div style="margin:6px 0; color: ${t.type==='income'? 'var(--green)' : t.type==='expense'?'var(--red)':'var(--purple)'}">
          ${amountSign} ${Number(t.amount).toLocaleString('id-ID')}
        </div>
        <div>${fromCol} → ${toNoteCol}</div>
        <button class="delete-btn" onclick="deleteTransaction('${t.id}')" style="margin-top:8px">Delete</button>
      `;
      cardsDiv.appendChild(card);
    });
  }

  function updateBalances() {
    const tbody = document.getElementById('balanceBody');
    tbody.innerHTML = '';

    const balances = getBalances();

    Object.entries(balances).sort((a,b) => b[1] - a[1]).forEach(([src, bal]) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${src}</td>
        <td style="text-align:right; color:${bal >= 0 ? 'var(--green)' : 'var(--red)'}">
          ${bal.toLocaleString('id-ID')}
        </td>
      `;
      tbody.appendChild(tr);
    });

    return balances;
  }

  function generateReport() {
    const balances = updateBalances();

    let totalIncome = 0, totalExpense = 0, totalTransferVol = 0;
    data.transactions.forEach(t => {
      const amt = Number(t.amount) || 0;
      if (t.type === 'income') totalIncome += amt;
      else if (t.type === 'expense') totalExpense += amt;
      else if (t.type === 'transfer') totalTransferVol += amt;
    });

    const netChange = totalIncome - totalExpense;

    document.getElementById('reportOverview').innerHTML = `
      <div>Total Income: <span class="income">+ ${totalIncome.toLocaleString('id-ID')}</span></div>
      <div>Total Spending: <span class="expense">- ${totalExpense.toLocaleString('id-ID')}</span></div>
      <div>Net Change: <span style="color:${netChange >= 0 ? 'var(--green)' : 'var(--red)'}">
        ${netChange >= 0 ? '+' : ''}${netChange.toLocaleString('id-ID')}
      </span></div>
      <div>Transfer Volume: ${totalTransferVol.toLocaleString('id-ID')}</div>
      <div style="margin-top:12px;">Transactions: ${data.transactions.length}</div>
    `;

    const grid = document.getElementById('reportPerSource');
    grid.innerHTML = '';

    data.sources.forEach(src => {
      let inSum = 0, outSum = 0, transIn = 0, transOut = 0;
      data.transactions.forEach(t => {
        const amt = Number(t.amount);
        if (t.type === 'income' && t.source === src) inSum += amt;
        if (t.type === 'expense' && t.source === src) outSum += amt;
        if (t.type === 'transfer') {
          if (t.to === src) transIn += amt;
          if (t.from === src) transOut += amt;
        }
      });

      const final = balances[src] || 0;

      const card = document.createElement('div');
      card.className = 'report-card';
      card.innerHTML = `
        <h4>${src}</h4>
        <div>Income: <span class="income">${inSum.toLocaleString('id-ID')}</span></div>
        <div>Spending: <span class="expense">${outSum.toLocaleString('id-ID')}</span></div>
        <div>Transfer In: ${transIn.toLocaleString('id-ID')}</div>
        <div>Transfer Out: ${transOut.toLocaleString('id-ID')}</div>
        <div style="margin-top:12px; font-size:1.15rem; font-weight:bold; color:${final >= 0 ? 'var(--green)' : 'var(--red)'}">
          Balance: ${final.toLocaleString('id-ID')}
        </div>
      `;
      grid.appendChild(card);
    });

    document.getElementById('reportDate').textContent = new Date().toLocaleString('id-ID');
  }

  function toggleReport() {
    const report = document.getElementById('report');
    report.style.display = report.style.display === 'block' ? 'none' : 'block';
    if (report.style.display === 'block') generateReport();
  }

  function toggleTransferFields() {
    const type = document.getElementById('type').value;
    document.getElementById('normalFields').style.display = type === 'transfer' ? 'none' : 'block';
    document.getElementById('transferFields').style.display = type === 'transfer' ? 'block' : 'none';
  }

  function updateAll() {
    updateSourceSelects();
    updateSourceList();
    updateTransactions();
    updateBalances();
    toggleTransferFields();
    if (document.getElementById('report').style.display === 'block') generateReport();
  }
  document.getElementById('btnAddSource').addEventListener('click', addSource);
  document.getElementById('btnToggleReport').addEventListener('click', toggleReport);
  document.getElementById('btnSaveTransaction').addEventListener('click', addTransaction);
  document.getElementById('type').addEventListener('change', toggleTransferFields);

  toggleTransferFields();
  // Init date picker
  document.getElementById('date').value = new Date().toISOString().slice(0,10);
</script>

</body>
</html>
